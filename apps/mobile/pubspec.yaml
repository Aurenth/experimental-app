name: experimental_app_mobile
description: Experimental app — Flutter frontend (dev/staging/prod flavours)
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.4.0

  # Crash reporting
  sentry_flutter: ^8.3.0

  # In-app purchases
  purchases_flutter: ^7.2.0

  # Analytics
  posthog_flutter: ^4.0.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Code gen / util annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Design system
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Misc
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.0.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

  # Linting
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
